      - title: "特朗普要求美政府机构弃用Anthropic AI，五角大楼称其为供应链风险｜日本时报"
        summary: "《日本时报》称，特朗普指示美国机构停止使用Anthropic的AI产品；五角大楼认为相关技术存在供应链/安全风险，争议引发科技与国家安全交叉议题。"
        source: japantimes.co.jp
