        summary: "半岛电视台AJLabs以地图形式梳理双方攻击与报复的地点与时间线，帮助读者理解冲突扩散路径与关键节点。"
        source: aljazeera.com
        time: "12:00"
        tag: "国际"
        url: "https://www.aljazeera.com/news/2026/2/28/mapping-us-and-israeli-attacks-on-iran-and-tehrans-retaliatory-strikes"

