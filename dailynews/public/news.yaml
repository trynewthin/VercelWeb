sections:
  - name: "🔥 头条"
    items:
      - title: "特朗普对伊朗发动新一轮打击，全球风险陡增｜路透社"
        summary: "路透社Breakingviews评论称，特朗普对伊朗采取强硬军事行动，可能引发地区冲突外溢、油价与金融市场波动，并带来更广泛的地缘政治不确定性。"
        source: reuters.com
        time: "12:00"
        url: "https://www.reuters.com/commentary/breakingviews/trumps-new-iran-attack-opens-up-big-global-risks-2026-02-28/"

  - name: "🌍 国际"
    items:
      - title: "以色列称哈梅内伊在袭击中身亡｜路透社"
        summary: "路透社报道，以色列方面称伊朗最高领袖哈梅内伊在美以对伊朗的打击中遇害，相关消息引发各方高度关注，局势仍在快速发展。"
        source: reuters.com
        time: "12:00"
        tag: "国际"
        url: "https://www.reuters.com/business/aerospace-defense/israel-us-launch-strikes-iran-2026-02-28/"

      - title: "独家：袭击前CIA评估哈梅内伊可能由强硬派IRGC接班｜路透社"
        summary: "路透社引述消息称，袭击发生前CIA曾评估哈梅内伊若被替换，接班人可能来自更强硬的伊斯兰革命卫队体系，这将影响伊朗后续权力走向。"
        source: reuters.com
        time: "12:00"
        tag: "国际"
        url: "https://www.reuters.com/world/middle-east/prior-iran-attacks-cia-assessed-khamenei-would-be-replaced-by-hardline-irgc-2026-02-28/"

      - title: "美国议员谴责特朗普对伊朗的打击：这是战争行为｜卫报"
        summary: "卫报报道，多名美国议员批评特朗普在未充分向公众与国会说明情况下对伊朗动武，认为这可能导致冲突升级并带来宪政与外交风险。"
        source: theguardian.com
        time: "12:00"
        tag: "国际"
        url: "https://www.theguardian.com/world/2026/feb/28/iran-attack-us-political-reaction"

      - title: "以色列称对伊朗发动“先发制人”打击｜路透社"
        summary: "路透社称，以色列表示已对伊朗发动“先发制人”打击。相关行动引发地区紧张升级，各方正在评估后续报复与外溢风险。"
        source: reuters.com
        time: "12:00"
        tag: "国际"
        url: "https://www.reuters.com/world/middle-east/israel-says-it-launched-pre-emptive-attack-against-iran-2026-02-28/"

      - title: "世界领导人担忧美以对伊朗的重大袭击引发更广泛升级｜《世界报》"
        summary: "法国《世界报》报道，多国领导人对美以对伊朗的打击及其可能引发的连锁反应表示担忧，呼吁克制并避免地区冲突扩大。"
        source: lemonde.fr
        time: "12:00"
        tag: "国际"
        url: "https://www.lemonde.fr/en/international/article/2026/02/28/world-leaders-fear-broader-escalation-after-major-us-and-israeli-attack-on-iran_6750959_4.html"

      - title: "伊朗报复：多个驻有美方资产的阿拉伯国家遭袭｜半岛电视台"
        summary: "半岛电视台称，伊朗确认对多处美国在中东地区的基地或相关设施实施打击，涉及多个承载美方资产的海湾阿拉伯国家，紧张局势进一步升级。"
        source: aljazeera.com
        time: "12:00"
        tag: "国际"
        url: "https://www.aljazeera.com/news/2026/2/28/multiple-gulf-arab-states-that-host-us-assets-targeted-in-iran-retaliation"

      - title: "各国如何回应美以对伊朗的攻击及德黑兰报复｜半岛电视台"
        summary: "半岛电视台汇总各方反应：欧盟呼吁‘最大限度克制’，斡旋方阿曼警告美国不要被进一步卷入，中东局势面临更大外溢风险。"
        source: aljazeera.com
        time: "12:00"
        tag: "国际"
        url: "https://www.aljazeera.com/news/2026/2/28/world-reacts-to-us-israel-attack-on-iran-tehran-retaliation"

