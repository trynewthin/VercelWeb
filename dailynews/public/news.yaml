sections:
  - name: 🔥 头条
    items:
      - type: alert
        level: info
        title: 昨日重点新闻速递（2026-03-05）/今日自动整理
        summary: 基于近24小时 RSS 更新自动筛选，已按事件去重（同一事件多来源仅保留一条）并完成中文化整理。
        time: "07:00"

      - title: "中东局势外溢：美方称潜艇击沉伊朗军舰，海上冲突升级"
        summary: "多家媒体报道，美伊冲突从空袭延伸至海上，印度洋与中东航线的安全风险同步上升。能源与航运市场对局势长期化保持高敏感。"
        source: "BBC News"
        time: "00:56"
        tag: "中东"
        url: https://www.bbc.com/news/articles/c0e55g03v2zo?at_medium=RSS&at_campaign=rss

  - name: 🌍 国际
    items:
      - title: "古巴大范围停电，燃料短缺与电网压力叠加"
        summary: "古巴西部大面积停电，数百万人受影响。能源供应紧张与基础设施老化叠加，民生与公共服务承压。"
        source: "BBC News"
        time: "06:46"
        tag: "拉美"
        url: https://www.bbc.com/news/articles/cx2ggpq1742o?at_medium=RSS&at_campaign=rss

      - title: "俄罗斯称油气船在地中海遇袭沉没，指向乌方海上无人系统"
        summary: "俄方将事故定性为袭击事件，相关说法仍待多方独立核实。事件再次推高地中海航运与能源运输的不确定性。"
        source: "BBC News"
        time: "02:14"
        tag: "俄乌"
        url: https://www.bbc.com/news/articles/cr5ll27z52do?at_medium=RSS&at_campaign=rss

      - title: "伊朗推迟最高领袖葬礼，称需更多安全与组织准备"
        summary: "在持续打击背景下，伊朗方面宣布调整葬礼安排。地区紧张态势未见明显缓和，外界继续关注后续军事与政治信号。"
        source: "BBC News"
        time: "02:10"
        tag: "中东"
        url: https://www.bbc.com/news/articles/clygglq6v9go?at_medium=RSS&at_campaign=rss

      - title: "西班牙回应美方贸易施压，首相公开强调“反对战争”"
        summary: "西班牙政府在安全与经贸议题上对美表达强硬立场。欧洲内部围绕对外政策协调与战略自主的讨论升温。"
        source: "BBC News"
        time: "04:42"
        tag: "欧洲"
        url: https://www.bbc.com/news/articles/c93wwq1n542o?at_medium=RSS&at_campaign=rss

      - title: "欧盟委员会提出“买欧盟”草案，瞄准低碳产业竞争力"
        summary: "新提案强调公共采购中的本地与低碳要素，意在提升欧洲清洁产业链韧性。该举措被视为应对全球产业竞争的政策转向。"
        source: "The Guardian"
        time: "01:18"
        tag: "欧盟政策"
        url: https://www.theguardian.com/world/2026/mar/04/european-commission-proposes-buy-eu-plan-to-compete-against-china

      - title: "美厄启动联合行动打击毒品走私网络"
        summary: "美国与厄瓜多尔宣布联合执法行动，聚焦跨境贩毒与有组织犯罪。拉美安全合作与地区执法联动继续加强。"
        source: "BBC News"
        time: "00:45"
        tag: "地区安全"
        url: https://www.bbc.com/news/articles/cgjzz4gn64zo?at_medium=RSS&at_campaign=rss

  - name: 💻 科技
    items:
      - title: "OpenAI CEO称公司不参与五角大楼具体作战决策"
        summary: "Sam Altman表示，企业提供AI能力后，军事场景中的具体使用不由公司主导。相关表态再次引发AI伦理与责任边界讨论。"
        source: "The Guardian"
        time: "06:55"
        tag: "AI治理"
        url: https://www.theguardian.com/technology/2026/mar/04/sam-altman-openai-pentagon

      - title: "Meta AI眼镜隐私争议发酵，英国监管机构介入关注"
        summary: "报道称监管方已就人工审核隐私视频问题接触Meta。可穿戴AI设备在数据采集、审查与告知机制上面临更严合规要求。"
        source: "BBC News"
        time: "00:23"
        tag: "隐私"
        url: https://www.bbc.com/news/articles/c0q33nvj0qpo?at_medium=RSS&at_campaign=rss

      - title: "Google面临Gemini相关首例非正常死亡诉讼"
        summary: "案件指控生成式AI产品在高风险心理场景中存在潜在伤害，聚焦平台安全防护责任。结果或影响行业对高风险交互的风控标准。"
        source: "BBC News"
        time: "02:55"
        tag: "平台责任"
        url: https://www.bbc.com/news/articles/czx44p99457o?at_medium=RSS&at_campaign=rss

      - title: "马斯克出庭回应推特收购案相关证券欺诈指控"
        summary: "投资者诉讼认为其公开言论曾压低股价、影响交易条件。该案后续进展可能继续影响社交平台并购与信息披露监管讨论。"
        source: "The Guardian"
        time: "04:47"
        tag: "平台与资本"
        url: https://www.theguardian.com/technology/2026/mar/04/elon-musk-twitter-takeover-trial

  - name: 🔬 科学
    items:
      - title: "NASA公布“类日恒星气泡”观测成果，揭示恒星风新证据"
        summary: "NASA称首次获取到围绕类太阳年轻恒星的“星际气泡”图像。研究有助于理解恒星风与行星环境长期演化。"
        source: "NASA"
        time: "00:34"
        tag: "天文"
        url: https://www.nasa.gov/image-article/blowing-stellar-bubbles/

      - title: "NASA介绍先进飞行器计划，聚焦低噪高效与高超声速技术"
        summary: "该计划覆盖从垂直起降到高超声速等多类前沿方向，目标是推动下一代航空系统能力储备。"
        source: "NASA"
        time: "03:00"
        tag: "航空技术"
        url: https://www.nasa.gov/directorates/armd/aavp/about-aavp/

      - title: "Artemis II任务支持系统进入关键准备阶段"
        summary: "NASA介绍猎户座乘员生命保障与热控系统的集成测试进展。相关硬件将为载人绕月任务提供核心安全保障。"
        source: "NASA"
        time: "00:31"
        tag: "载人航天"
        url: https://www.nasa.gov/missions/artemis/i-am-artemis/i-am-artemis-paul-boehm/

      - title: "英国新疗法为Dravet综合征患儿带来治疗突破"
        summary: "BBC报道，针对严重癫痫儿童的新药在临床与家庭反馈中展现积极效果。该进展为罕见病治疗与医保评估带来新依据。"
        source: "BBC News"
        time: "06:06"
        tag: "医疗"
        url: https://www.bbc.com/news/articles/c3rzj9jy9e8o?at_medium=RSS&at_campaign=rss

  - name: 💰 财经
    items:
      - type: stats
        title: 市场与政策关注（近24小时）
        metrics:
          - label: 关税预期
            value: "美国财政部称本周或上调全球关税"
          - label: 能源风险
            value: "中东冲突推升油气与电价波动"
          - label: 欧盟产业政策
            value: "“买欧盟”提案进入讨论"

      - title: "美国财政部称本周或上调全球关税，贸易风险再升温"
        summary: "关税政策预期强化后，市场重新评估供应链与通胀传导压力。跨境制造与进口依赖型行业面临更高不确定性。"
        source: "BBC News"
        time: "06:11"
        tag: "贸易"
        url: https://www.bbc.com/news/articles/cjwzzq70qgvo?at_medium=RSS&at_campaign=rss

      - title: "英国机构测算：若气价高位延续，居民能源账单或明显上升"
        summary: "受地缘冲突影响，天然气价格波动加剧，家庭能源支出面临上行风险。政策层面将继续权衡保供、控价与财政压力。"
        source: "The Guardian"
        time: "01:46"
        tag: "民生成本"
        url: https://www.theguardian.com/money/2026/mar/04/iran-conflict-energy-bills-gas-prices

      - title: "中东冲突扰动下，全球股市与油价延续高波动"
        summary: "市场交易围绕冲突持续时间与外溢路径反复定价。能源、航运与防务板块的短期分化明显。"
        source: "BBC News"
        time: "03:00"
        tag: "市场"
        url: https://www.bbc.com/news/articles/cwy884ekn0jo?at_medium=RSS&at_campaign=rss

      - type: list
        title: 其他简讯
        source: "BBC / The Guardian"
        points:
          - "欧盟高层就成员国安全与贸易议题发声，强调共同应对外部压力。"
          - "英国就中东局势继续评估军事与撤离部署节奏。"
          - "国际舆论持续关注冲突对全球航运保险与大宗商品价格的传导。"