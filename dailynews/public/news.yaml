sections:
  - name: "🔥 头条"
    items:
      - title: "路透：美以袭击致伊朗最高领袖哈梅内伊之女与外孙遇难"
        summary: "路透社援引伊朗官媒称，最高领袖哈梅内伊的女儿与外孙在美国与以色列的袭击中身亡。事件加剧地区紧张，外界关注伊朗后续反应与局势走向。"
        source: reuters.com
        time: "12:00"
        url: "https://www.reuters.com/world/middle-east/daughter-grandchild-irans-khamenei-killed-us-israeli-strikes-state-media-says-2026-03-01/"

  - name: "🌍 国际"
    items:
      - title: "BBC：全球如何回应美以对伊朗的打击"
        summary: "BBC梳理各方表态与局势进展：伊朗称已打击驻巴林美军基地并在区域内发动行动；多国呼吁克制，担忧冲突外溢。"
        source: bbc.com
        time: "12:00"
        tag: "国际"
        url: "https://www.bbc.com/news/articles/c5yj9kr31y7o"

      - title: "伊朗官媒确认最高领袖哈梅内伊身亡｜路透"
        summary: "路透社报道，伊朗国家媒体确认最高领袖哈梅内伊在袭击中身亡。相关消息可能改变伊朗政治与安全格局，并引发地区局势进一步升级。"
        source: reuters.com
        time: "12:00"
        tag: "国际"
        url: "https://www.reuters.com/world/middle-east/irans-supreme-leader-khamenei-killed-iranian-state-media-confirm-2026-03-01/"

